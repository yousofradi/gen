        <!-- Add Form -->
        <div class="admin-card mb-24">
          <h3 class="mb-16">إضافة Webhook</h3>
          <div class="form-group">
            <label class="form-label">رابط الـ Webhook (URL) *</label>
            <input type="url" class="form-control" id="w-url" placeholder="https://your-webhook.url/endpoint">
          </div>
          <div class="form-group">
            <label class="form-label">الوصف</label>
            <input type="text" class="form-control" id="w-desc" placeholder="مثال: Zapier integration">
          </div>
          <div class="form-group">
            <label class="form-label">الأحداث *</label>
            <div class="flex gap-16" style="flex-wrap:wrap">
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" id="ev-created" checked style="accent-color:var(--primary)"> order.created
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" id="ev-paid" style="accent-color:var(--primary)"> order.paid
              </label>
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                <input type="checkbox" id="ev-updated" style="accent-color:var(--primary)"> order.updated
              </label>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
              <input type="checkbox" id="w-active" checked style="accent-color:var(--primary)">
              <span>مفعّل</span>
            </label>
          </div>
          <button class="btn btn-primary mt-16" onclick="createWebhook()">+ إضافة Webhook</button>
        </div>

        <!-- List -->

            <thead>

  <script src="js/api-v2.js?v=20260515_v2"></script>
  <script src="js/auth-v2.js?v=20260515_v2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      try {
        await loadWebhooks();
      } finally {
        document.body.classList.remove('is-loading');
      }
    });

    window.handleGlobalDiscard = () => {
      document.getElementById('w-url').value = '';
      document.getElementById('w-desc').value = '';
      document.getElementById('ev-created').checked = true;
      document.getElementById('ev-paid').checked = false;
      document.getElementById('ev-updated').checked = false;
      document.getElementById('w-active').checked = true;
      if (window.hideBar) window.hideBar();
    };

    window.handleGlobalSave = async () => {
      createWebhook();
      return true;
    };

    async function loadWebhooks() {
      const tbody = document.getElementById('webhooks-tbody');
      try {
        const list = await api.getWebhooks();
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted" style="padding:30px">لا توجد webhooks بعد</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(w => `
          <tr>
            <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              <code style="font-size:0.8rem;background:var(--bg-body);padding:3px 8px;border-radius:4px">${w.url}</code>
              ${w.description ? `<div class="text-sm text-muted mt-8">${w.description}</div>` : ''}
            </td>
            <td>${(w.events||[]).map(e=>`<span class="badge badge-info" style="margin:2px">${e}</span>`).join('')}</td>
            <td>
              <span class="badge ${w.active ? 'badge-success' : 'badge-warning'}">
                ${w.active ? 'مفعّل' : 'معطّل'}
              </span>
            </td>
            <td>
              <div class="flex gap-8">
                <button class="btn btn-secondary btn-sm" onclick="toggleWebhook('${w._id}',${!w.active})">
                  ${w.active ? 'تعطيل' : 'تفعيل'}
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteWebhook('${w._id}')">حذف</button>
              </div>
            </td>
          </tr>`).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">فشل التحميل</td></tr>';
      }
    }

    async function createWebhook() {
      const url  = document.getElementById('w-url').value.trim();
      const desc = document.getElementById('w-desc').value.trim();
      const events = [];
      if (document.getElementById('ev-created').checked) events.push('order.created');
      if (document.getElementById('ev-paid').checked)    events.push('order.paid');
      if (document.getElementById('ev-updated').checked) events.push('order.updated');
      const active = document.getElementById('w-active').checked;

      if (!url) return showToast('يرجى إدخال الرابط', 'error');
      if (!events.length) return showToast('اختر حدثاً واحداً على الأقل', 'error');

      try {
        await api.createWebhook({ url, description: desc, events, active });
        showToast('تم إضافة الـ Webhook <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>');
        document.getElementById('w-url').value = '';
        document.getElementById('w-desc').value = '';
        loadWebhooks();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function toggleWebhook(id, active) {
      try {
        await api.updateWebhook(id, { active });
        loadWebhooks();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function deleteWebhook(id) {
      const confirmed = await window.showConfirmModal('تأكيد الحذف', 'حذف هذا الـ Webhook؟');
      if (!confirmed) return;
      try { await api.deleteWebhook(id); showToast('تم الحذف'); loadWebhooks(); }
      catch (e) { showToast(e.message, 'error'); }
    }
  </script>
