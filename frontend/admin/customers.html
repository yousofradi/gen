<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>العملاء — لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .customers-table-wrap table th {
      padding: 16px;
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }
    .customers-table-wrap table td {
      padding: 16px;
      font-size: 0.95rem;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }
    .customers-table-wrap table tr:hover td {
      background: #f8fafc;
    }
    .avatar {
      width: 40px;
      height: 40px;
      background: #f1f5f9;
      color: #64748b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
    }
    @media (max-width: 600px) {
      .hide-mobile {
        display: none !important;
      }
      .customers-table-wrap table td, .customers-table-wrap table th {
        padding: 12px 8px;
        font-size: 0.85rem;
      }
      .avatar {
        width: 32px;
        height: 32px;
        font-size: 0.75rem;
      }
      .customers-table-wrap table {
        min-width: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    
    <aside class="admin-sidebar">
      <div class="admin-brand-header">
        <div class="admin-brand-title">Shop</div>
        <a href="../" target="_blank" class="admin-store-preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          معاينة المتجر
        </a>
      </div>
      <button class="sidebar-toggle" style="position:absolute; top:20px; left:20px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#475569;">☰</button>
      
      <nav class="admin-nav">
        <a href="/">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          الرئيسية
        </a>
        <a href="orders.html">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          الطلبات
        </a>
        <a href="customers.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          العملاء
        </a>
        <a href="products.html">
          <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          المنتجات
        </a>
        <a href="collections.html">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          المجموعات
        </a>
        <a href="homepage.html">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
          تخصيص الواجهة
        </a>
        <a href="shipment.html">
          <svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
          الشحن
        </a>
        <a href="settings.html">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          إعدادات المتجر
        </a>
        <a href="webhooks.html">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
          Webhooks
        </a>
        <a href="#" onclick="logout()" class="logout">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          خروج
        </a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="max-width:1300px">
        <div class="flex-between mb-24 align-center">
          <div>
            <h1 class="page-title" style="margin-bottom:0; font-size: 1.5rem; color:#1e293b; font-weight:700;">العملاء</h1>
          </div>
        </div>

        <div style="background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <div id="filter-bar" style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; gap:16px;">
            <div style="display:flex; gap:24px; align-items:center;">
              <span style="font-size: 0.95rem; font-weight: 600; color: #0f766e;">الجميع <span class="tab-badge" id="count-all">250</span></span>
            </div>

            <div style="position:relative; width:300px; max-width:100%;">
              <input type="text" id="customer-search" placeholder="ابحث عن عميل..." style="width:100%; padding:8px 16px; padding-left:40px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.9rem;" oninput="filterCustomers()">
              <span style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            </div>
          </div>

          <div class="table-wrapper customers-table-wrap" style="box-shadow:none; border-radius:0; margin:0; border:none;">
            <table style="width:100%; border-collapse:collapse; text-align:right;">
              <thead>
                <tr>
                  <th class="hide-mobile" style="width: 40px; text-align: center;">
                    <input type="checkbox" id="select-all" style="width:16px; height:16px; border-radius:4px; accent-color:#0f766e;">
                  </th>
                  <th>بيانات العميل</th>
                  <th class="hide-mobile">المحافظة</th>
                  <th class="hide-mobile">الطلبات</th>
                  <th class="hide-mobile">آخر طلب</th>
                </tr>
              </thead>
              <tbody id="customers-tbody">
                <tr><td colspan="5" class="text-center" style="padding:32px;"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/customers.js"></script>
</body>
</html>
