    <main class="admin-main">
      <div style="max-width:900px">
        <div class="flex-between mb-24">
          <div>
            <h1 class="page-title" style="margin-bottom:4px">رسوم الشحن</h1>
            <p class="page-subtitle" style="margin-bottom:0">تحديد تكلفة الشحن لكل محافظة</p>
          </div>
          <div class="flex gap-12">
            <button class="btn btn-secondary" onclick="bulkUpdateShipping()">تحديث كافة المحافظات دفعة واحدة</button>
            <button class="btn btn-primary" onclick="showAddForm()">+ إضافة محافظة</button>
          </div>
        </div>

        <!-- Add/Edit Form -->
        <div class="admin-card mb-24" id="add-form" style="display:none">
          <h3 class="mb-16" id="form-title">إضافة محافظة</h3>
          <div class="grid-2" style="gap:16px">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">اسم المحافظة *</label>
              <input type="text" class="form-control" id="ship-gov" placeholder="مثال: القاهرة">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">رسوم الشحن (ج.م) *</label>
              <input type="number" class="form-control" id="ship-fee" min="0" placeholder="85">
            </div>
          </div>
          <div class="flex gap-8 mt-16">
            <button class="btn btn-primary" id="save-ship-btn" onclick="saveShipping()">حفظ</button>
            <button class="btn btn-secondary" onclick="hideAddForm()">إلغاء</button>
          </div>
          <input type="hidden" id="ship-edit-id">
        </div>

        <div class="table-wrapper">
          <table>
            <thead><tr><th>المحافظة</th><th>الرسوم</th><th>إجراءات</th></tr></thead>
            <tbody id="shipping-tbody">
              <tr><td colspan="3" class="text-center"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let shippingList = [];
    let originalShipping = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      loadShipping();
    });

    window.handleGlobalDiscard = () => {
      hideAddForm();
      if (window.hideBar) window.hideBar();
    };

    window.handleGlobalSave = async () => {
      if (document.getElementById('add-form').style.display === 'block') {
        saveShipping();
        return true;
      }
      return false;
    };

    async function loadShipping() {
      const tbody = document.getElementById('shipping-tbody');
      try {
        // Try DB list first, fall back to flat map
        let list = [];
        try {
          list = await api.getShippingList();
        } catch {
          const map = await api.getShipping();
          list = Object.entries(map).map(([governorate, fee]) => ({ governorate, fee }));
        }
        shippingList = list;
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted" style="padding:30px">لا توجد بيانات شحن</td></tr>';
          return;
        }
        tbody.innerHTML = list.map(s => `
          <tr>
            <td style="font-weight:600">${s.governorate}</td>
            <td style="color:var(--primary);font-weight:600">${formatPrice(s.fee)}</td>
            <td>
              <div class="flex gap-8">
                <button class="btn btn-secondary btn-sm" onclick="editShipping('${s._id||''}','${s.governorate}',${s.fee})">تعديل</button>
                ${s._id ? `<button class="btn btn-danger btn-sm" onclick="deleteShipping('${s._id}')">حذف</button>` : ''}
              </div>
            </td>
          </tr>`).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">فشل التحميل</td></tr>';
      }
    }

    function showAddForm() {
      document.getElementById('add-form').style.display = 'block';
      document.getElementById('form-title').textContent = 'إضافة محافظة';
      document.getElementById('ship-gov').value = '';
      document.getElementById('ship-fee').value = '';
      document.getElementById('ship-edit-id').value = '';
      document.getElementById('ship-gov').disabled = false;
    }

    function hideAddForm() {
      document.getElementById('add-form').style.display = 'none';
    }

    function editShipping(id, gov, fee) {
      document.getElementById('add-form').style.display = 'block';
      document.getElementById('form-title').textContent = 'تعديل رسوم الشحن';
      document.getElementById('ship-gov').value = gov;
      document.getElementById('ship-gov').disabled = true; // can't change governorate name
      document.getElementById('ship-fee').value = fee;
      document.getElementById('ship-edit-id').value = id;
    }

    async function saveShipping() {
      const gov = document.getElementById('ship-gov').value.trim();
      const fee = parseFloat(document.getElementById('ship-fee').value);
      const id  = document.getElementById('ship-edit-id').value;
      if (!gov || isNaN(fee)) return showToast('يرجى ملء جميع الحقول', 'error');

      const btn = document.getElementById('save-ship-btn');
      btn.disabled = true;
      try {
        if (id) {
          await api.updateShipping(id, { fee });
        } else {
          await api.createShipping({ governorate: gov, fee });
        }
        hideAddForm();
        showToast('تم الحفظ <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>');
        loadShipping();
      } catch (e) { showToast(e.message, 'error'); }
      finally { btn.disabled = false; }
    }

    async function deleteShipping(id) {
      const confirmed = await window.showConfirmModal('تأكيد الحذف', 'حذف هذه المحافظة؟');
      if (!confirmed) return;
      try { await api.deleteShipping(id); showToast('تم الحذف'); loadShipping(); }
      catch (e) { showToast(e.message, 'error'); }
    }

    async function bulkUpdateShipping() {
      const confirmed = await window.showConfirmModal('تأكيد التحديث', 'هل أنت متأكد من تحديث أسعار الشحن لجميع المحافظات وحذف الأسعار القديمة؟');
      if (!confirmed) return;
      
      const newFees = [
        { governorate: 'القاهرة', fee: 85 }, { governorate: 'الجيزة', fee: 85 },
        { governorate: 'الإسكندرية', fee: 85 }, { governorate: 'البحيرة', fee: 85 },
        { governorate: 'القليوبية', fee: 85 }, { governorate: 'الغربية', fee: 85 },
        { governorate: 'المنوفية', fee: 85 }, { governorate: 'دمياط', fee: 85 },
        { governorate: 'الدقهلية', fee: 85 }, { governorate: 'كفر الشيخ', fee: 85 },
        { governorate: 'الشرقية', fee: 85 }, { governorate: 'الاسماعيلية', fee: 95 },
        { governorate: 'السويس', fee: 95 }, { governorate: 'بورسعيد', fee: 95 },
        { governorate: 'الفيوم', fee: 110 }, { governorate: 'بني سويف', fee: 110 },
        { governorate: 'المنيا', fee: 110 }, { governorate: 'اسيوط', fee: 110 },
        { governorate: 'سوهاج', fee: 130 }, { governorate: 'قنا', fee: 130 },
        { governorate: 'أسوان', fee: 130 }, { governorate: 'الأقصر', fee: 130 },
        { governorate: 'البحر الأحمر', fee: 130 }, { governorate: 'مرسي مطروح', fee: 135 },
        { governorate: 'الوادي الجديد', fee: 135 }, { governorate: 'شمال سيناء', fee: 135 },
        { governorate: 'جنوب سيناء', fee: 135 }
      ];

      try {
        showToast('جاري التحديث... قد يستغرق بضع ثوانٍ', 'info');
        // Delete all existing
        for (const s of shippingList) {
          if (s._id) await api.deleteShipping(s._id);
        }
        // Insert new
        for (const s of newFees) {
          await api.createShipping(s);
        }
        showToast('تم تحديث المحافظات بنجاح <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>');
        loadShipping();
      } catch (err) {
        showToast(err.message || 'فشل التحديث الشامل', 'error');
      }
    }
  </script>
