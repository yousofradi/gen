  <style>
    @media (max-width: 768px) {

      /* Hide: Products(4), Payment(6), Total(7), Date(8) */
      .orders-table-wrap th:nth-child(4),
      .orders-table-wrap td:nth-child(4),
      .orders-table-wrap th:nth-child(6),
      .orders-table-wrap td:nth-child(6),
      .orders-table-wrap th:nth-child(7),
      .orders-table-wrap td:nth-child(7),
      .orders-table-wrap th:nth-child(8),
      .orders-table-wrap td:nth-child(8) {
        display: none !important;
      }

      .orders-table-wrap table {
        table-layout: fixed !important;
        min-width: 0 !important;
        width: 100% !important;
        border-spacing: 0;
      }

      .orders-table-wrap table th,
      .orders-table-wrap table td {
        padding: 8px 2px !important;
        font-size: 0.75rem !important;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Column Widths (RTL: 1=Right, 5=Left) */
      .orders-table-wrap th:nth-child(1), .orders-table-wrap td:nth-child(1) { width: 32px !important; }
      .orders-table-wrap th:nth-child(2), .orders-table-wrap td:nth-child(2) { width: 40px !important; text-align: center !important; }
      .orders-table-wrap th:nth-child(3), .orders-table-wrap td:nth-child(3) { width: 180px !important; text-align: center !important; }
      .orders-table-wrap th:nth-child(5), .orders-table-wrap td:nth-child(5) { width: auto !important; text-align: center !important; }

      .status-badge-pill {
        padding: 2px 4px;
        font-size: 0.65rem;
        margin: 0 !important;
      }

      /* Ensure no horizontal overflow on body */
      body {
        overflow-x: hidden !important;
      }

      .admin-main {
        padding: 10px 4px !important;
        overflow-x: hidden !important;
      }
    }

    @media (max-width: 540px) {

      /* Make buttons smaller on phone screen */
      .page-actions-container {
        flex-direction: row-reverse;
        justify-content: flex-start;
      }

      .page-actions-container button {
        padding: 4px 8px;
        font-size: 0.8rem;
      }

      .page-actions-container a {
        padding: 4px 8px;
        font-size: 0.8rem;
      }
    }

    .order-tab {
      font-size: 0.95rem;
      color: #64748b;
      cursor: pointer;
      position: relative;
      padding-bottom: 10px;
      margin-bottom: -4px;
    }

    .order-tab.active {
      color: var(--primary, var(--primary));
      font-weight: 600;
    }

    .order-tab.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary, var(--primary));
    }

    .tab-badge {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-right: 4px;
    }

    .status-badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-paid {
      background: var(--primary-light);
      color: var(--primary, var(--primary));
      border: 1px solid #E5D5C0;
    }

    .badge-paid .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary, var(--primary));
    }

    .badge-partial {
      background: #dcfce7;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .badge-partial .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #16a34a;
    }

    .badge-unpaid {
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    .badge-unpaid .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .badge-neutral {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #f1f5f9;
    }

    .badge-neutral .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .orders-table-wrap table th {
      padding: 16px;
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }

    .orders-table-wrap table td {
      padding: 16px;
      font-size: 0.95rem;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }

    .orders-table-wrap table tr:hover td {
      background: #f8fafc;
    }

    .order-tabs {
      display: flex;
      gap: 24px;
      align-items: center;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      /* Hide scrollbar Firefox */
      -ms-overflow-style: none;
      /* Hide scrollbar IE/Edge */
      padding-bottom: 4px;
    }

    .order-tabs::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar Chrome/Safari */
  </style>
