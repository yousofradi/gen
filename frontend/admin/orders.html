<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلبات — لوحة التحكم</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media (max-width: 768px) {

      .orders-table-wrap th:nth-child(4),
      .orders-table-wrap td:nth-child(4),
      .orders-table-wrap th:nth-child(8),
      .orders-table-wrap td:nth-child(8) {
        display: none;
      }
    }

    @media (max-width: 540px) {

      .orders-table-wrap th:nth-child(6),
      .orders-table-wrap td:nth-child(6) {
        display: none;
      }

      /* Make buttons smaller on phone screen */
      .page-actions-container {
        flex-direction: row-reverse;
        justify-content: flex-start;
      }

      .page-actions-container button {
        padding: 4px 8px;
        font-size: 0.8rem;
      }

      .page-actions-container a {
        padding: 4px 8px;
        font-size: 0.8rem;
      }
    }

    .order-tab {
      font-size: 0.95rem;
      color: #64748b;
      cursor: pointer;
      position: relative;
      padding-bottom: 16px;
      margin-bottom: -16px;
    }

    .order-tab.active {
      color: var(--primary, var(--primary));
      font-weight: 600;
    }

    .order-tab.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary, var(--primary));
    }

    .tab-badge {
      display: inline-block;
      background: #f1f5f9;
      color: #475569;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      margin-right: 4px;
    }

    .status-badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-paid {
      background: var(--primary-light);
      color: var(--primary, var(--primary));
      border: 1px solid #E5D5C0;
    }

    .badge-paid .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary, var(--primary));
    }

    .badge-partial {
      background: #dcfce7;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .badge-partial .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #16a34a;
    }

    .badge-unpaid {
      background: #fff;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    .badge-unpaid .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .badge-neutral {
      background: #f8fafc;
      color: #475569;
      border: 1px solid #f1f5f9;
    }

    .badge-neutral .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
    }

    .orders-table-wrap table th {
      padding: 16px;
      font-size: 0.85rem;
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }

    .orders-table-wrap table td {
      padding: 16px;
      font-size: 0.95rem;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
      background: #fff;
    }

    .orders-table-wrap table tr:hover td {
      background: #f8fafc;
    }

    .order-tabs {
      display: flex;
      gap: 24px;
      align-items: center;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      /* Hide scrollbar Firefox */
      -ms-overflow-style: none;
      /* Hide scrollbar IE/Edge */
      padding-bottom: 4px;
    }

    .order-tabs::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar Chrome/Safari */
  </style>
</head>

<body>
  <div class="admin-layout">

    <aside class="admin-sidebar">
      <div class="admin-brand-header">
        <div class="admin-brand-title store-name-text"></div>
        <a href="#" target="_blank" class="admin-store-preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          معاينة المتجر
        </a>
      </div>
      <button class="sidebar-toggle"
        style="position:absolute; top:20px; left:20px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#475569;">☰</button>

      <nav class="admin-nav">
        <a href="/">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          الرئيسية
        </a>
        <a href="orders.html" class="active">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          الطلبات
        </a>
        <a href="customers.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          العملاء
        </a>
        <a href="products.html">
          <svg viewBox="0 0 24 24">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
            <line x1="7" y1="7" x2="7.01" y2="7"></line>
          </svg>
          المنتجات
        </a>
        <a href="collections.html">
          <svg viewBox="0 0 24 24">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
          المجموعات
        </a>
        <a href="homepage.html">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
          تخصيص الواجهة
        </a>
        <a href="shipment.html">
          <svg viewBox="0 0 24 24">
            <rect x="1" y="3" width="15" height="13"></rect>
            <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
            <circle cx="5.5" cy="18.5" r="2.5"></circle>
            <circle cx="18.5" cy="18.5" r="2.5"></circle>
          </svg>
          الشحن
        </a>
        <a href="settings.html">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
          الإعدادات
        </a>
        <a href="#" onclick="logout()" class="logout">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          تسجيل الخروج
        </a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="max-width:1300px">
        <div class="flex-between mb-24 align-center">
          <div>
            <h1 class="page-title" style="margin-bottom:0; font-size: 1.5rem; color:#1e293b; font-weight:700;">الطلبات
            </h1>
          </div>
          <div class="page-actions-container" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <a href="order-form.html" class="btn btn-primary"
              style="gap:6px; background:var(--primary, var(--primary)); border:none; border-radius:20px; padding:8px 20px; font-weight:600;">+
              أنشئ طلب</a>
            <button onclick="printInvoices()" class="btn btn-secondary"
              style="gap:6px; border-radius:20px; padding:8px 20px; background:#fff; border:1px solid #e2e8f0; color:#475569; font-weight:600;"
              id="print-invoices-btn">الفواتير <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" style="vertical-align: middle;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
              </svg></button>
          </div>
        </div>

        <div style="background:#fff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
          <div id="filter-bar"
            style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; gap:16px;">
            <div class="order-tabs">
              <span class="order-tab active" data-filter="all" onclick="setFilter('all')">الجميع <span class="tab-badge"
                  id="count-all">0</span></span>
              <span class="order-tab" data-filter="pending" onclick="setFilter('pending')">بانتظار التجهيز <span
                  class="tab-badge" id="count-pending">0</span></span>
              <span class="order-tab" data-filter="unpaid" onclick="setFilter('unpaid')">غير مدفوع <span
                  class="tab-badge" id="count-unpaid">0</span></span>
              <span class="order-tab" data-filter="archived" onclick="setFilter('archived')">الأرشيف</span>
            </div>
            <div style="position:relative; width:300px; max-width:100%;">
              <input type="text" id="order-search" placeholder="البحث والتصنيفات"
                style="width:100%; padding:8px 16px; padding-left:40px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.9rem;"
                oninput="filterOrdersClient()">
              <span
                style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none;"><svg
                  width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  style="vertical-align: middle;">
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg></span>
            </div>
          </div>

          <div id="bulk-actions-bar"
            style="display:none; justify-content:flex-start; align-items:center; padding:16px 20px; border-bottom:1px solid #f1f5f9; background:#fff; gap:12px;">
            <button class="btn btn-primary" onclick="unselectAll()"
              style="border-radius:20px; padding:8px 16px; border:none; background:#0f766e; color:#fff; font-weight:600; display:flex; align-items:center; gap:8px;">
              تم تحديد <span id="selected-count-badge">1</span>
            </button>
            <div style="position:relative;">
              <button class="btn btn-secondary" onclick="toggleBulkMenu(event)"
                style="border-radius:20px; padding:8px 16px; border:1px solid #e2e8f0; background:#fff; color:#475569; font-weight:600; display:flex; align-items:center; gap:8px;">
                المزيد
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
              </button>
              <div id="bulk-menu"
                style="display:none; position:absolute; top:100%; right:0; margin-top:8px; background:#fff; border:1px solid #e2e8f0; border-radius:12px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); width:200px; z-index:100; overflow:hidden; padding:4px;">
                
                <button onclick="bulkAction('archive')"
                  style="width:100%; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:none; border:none; cursor:pointer; color:#475569; font-size:0.9rem; font-family:var(--font-main); border-radius:8px; transition:background 0.2s;">
                  <span>أرشفة</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                </button>

                <button onclick="bulkAction('cancel')"
                  style="width:100%; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:none; border:none; cursor:pointer; color:#ef4444; font-size:0.9rem; font-family:var(--font-main); border-radius:8px; transition:background 0.2s;">
                  <span>إلغاء الطلب</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </button>

                <div style="height:1px; background:#f1f5f9; margin:4px 8px;"></div>

                <button onclick="bulkAction('delete')"
                  style="width:100%; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:none; border:none; cursor:pointer; color:#ef4444; font-size:0.9rem; font-family:var(--font-main); border-radius:8px; transition:background 0.2s;">
                  <span style="font-weight:600;">حذف نهائي</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
              </div>
            </div>
          </div>

          <div class="table-wrapper orders-table-wrap" style="box-shadow:none; border-radius:0; margin:0; border:none;">
            <table style="width:100%; border-collapse:collapse; text-align:right;">
              <thead>
                <tr>
                  <th style="width: 40px; text-align: center;">
                    <input type="checkbox" id="select-all-orders" onchange="toggleSelectAll()"
                      style="width:16px; height:16px; border-radius:4px; accent-color:#0f766e;">
                  </th>
                  <th style="text-align: center;">رقم الطلب</th>
                  <th style="text-align: center;">العميل</th>
                  <th style="text-align: center;">المنتجات</th>
                  <th style="text-align: center;">الحالة</th>
                  <th style="text-align: center;">الدفع</th>
                  <th style="text-align: center;">الإجمالي</th>
                  <th style="text-align: center;">التاريخ</th>
                </tr>
              </thead>
              <tbody id="orders-tbody">
                <tr>
                  <td colspan="8" class="text-center" style="padding:32px;">
                    <div class="spinner"></div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div
            style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-top:1px solid #f1f5f9; background:#fff;">
            <div style="font-size:0.85rem; color:#64748b;">
              عدد الطلبات: <span id="pagination-info">0</span>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <button onclick="changePage(-1)" id="prev-page" class="btn btn-sm"
                style="display:flex; align-items:center; gap:6px;">
                السابق
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </button>
              <select id="page-dropdown" onchange="goToPage(this.value)"
                style="border:1px solid #e2e8f0; border-radius:6px; padding:4px 8px; appearance:none; text-align:center; min-width:50px;"></select>
              <button onclick="changePage(1)" id="next-page" class="btn btn-sm"
                style="display:flex; align-items:center; gap:6px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                التالي
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/orders.js"></script>
</body>

</html>
