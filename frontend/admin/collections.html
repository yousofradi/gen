  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    .collection-row {
      display: grid;
      grid-template-columns: 40px 60px 1fr 60px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      gap: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .collection-row:hover { background: #f8fafc; }
    .collection-row.header {
      font-weight: 600;
      color: var(--text-muted);
      background: #f9fafb;
      border-radius: 8px 8px 0 0;
      cursor: default;
    }
    .collection-row.header:hover { background: #f9fafb; }
    .collection-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #eee;
    }
    .collection-img-placeholder {
      width: 60px; height: 60px;
      border-radius: 8px; background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: #94a3b8;
    }
    .btn-create-collection {
      background: var(--primary, var(--primary));
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .search-bar {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 16px;
    }
    .action-menu {
      color: #999;
      cursor: pointer;
      font-size: 1.5rem;
      text-align: center;
    }

    @media (max-width: 768px) {
      .collection-row {
        grid-template-columns: 50px 1fr 60px;
        gap: 10px;
        padding: 12px;
      }
      .collection-row .col-products { display: none; }
      .collection-row.header .col-products { display: none; }
      .collection-img, .collection-img-placeholder {
        width: 46px; height: 46px;
      }
    }
    .collection-checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--primary);
    }
    @media (max-width: 480px) {
      .header-actions { flex-direction: column; align-items: stretch; }
      .header-actions h1 { font-size: 1.2rem; }
    }
  </style>
</head>
