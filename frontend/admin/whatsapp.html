        <!-- Add Form -->
        <div class="admin-card mb-24">
          <h3 class="mb-16">إضافة إعدادات WhatsApp</h3>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label class="form-label">رابط الـ API (Base URL) *</label>
              <input type="url" id="w-base-url" class="form-control" placeholder="https://evolution-api.com" dir="ltr">
            </div>
            <div class="form-group">
              <label class="form-label">اسم النسخة (Instance) *</label>
              <input type="text" id="w-instance" class="form-control" placeholder="Instance01" dir="ltr">
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
              <label class="form-label">مفتاح الـ API Key *</label>

            </div>
            <div class="form-group">
              <label class="form-label">رقم المستلم (التاجر) *</label>
              <input type="text" id="w-number" class="form-control" placeholder="201012345678" dir="ltr">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">يتم الإرسال عند (Triggers) *</label>

               <label class="trigger-item">
                 <input type="checkbox" class="w-trigger-check" value="order.created" style="accent-color:#0f766e">
                 <span>طلب جديد (New Order)</span>
               </label>
               <label class="trigger-item">
                 <input type="checkbox" class="w-trigger-check" value="order.paid" style="accent-color:#0f766e">

               </label>
            </div>

          <button class="btn btn-primary" onclick="addConfig()" style="padding:10px 24px; font-weight:600; border-radius:30px">+ إضافة الإعدادات</button>

  <script>
    const CONFIG_KEY = 'whatsapp_configs';

    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAdmin()) return;
      try {
        await loadConfigs();
      } finally {
        document.body.classList.remove('is-loading');
      }
    });

    async function loadConfigs() {
      const tbody = document.getElementById('configs-tbody');
      try {
        const configs = await api.getSetting(CONFIG_KEY, false) || [];
        if (!configs.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted" style="padding:32px">لا توجد إعدادات مضافة</td></tr>';
          return;
        }

        tbody.innerHTML = configs.map((c, idx) => `
          <tr style="border-bottom:1px solid #f1f5f9">
            <td style="padding:16px">
              <div style="font-weight:600; color:#1e293b">${c.instance}</div>
              <div style="font-size:0.8rem; color:#64748b">${c.number}</div>
            </td>
            <td style="padding:16px">
              <div style="display:flex; gap:4px; flex-wrap:wrap">
                ${(c.triggers || []).map(t => `
                  <span class="badge ${t === 'order.paid' ? 'badge-paid' : 'badge-new'}" style="padding:4px 10px; border-radius:12px; font-size:0.7rem; font-weight:600">
                    ${t === 'order.paid' ? 'تم الدفع' : 'طلب جديد'}
                  </span>
                `).join('')}
              </div>
            </td>
            <td style="padding:16px">
              <button class="btn btn-danger btn-sm" onclick="deleteConfig(${idx})" style="padding:6px 12px; border-radius:6px; font-size:0.8rem">حذف</button>
            </td>
          </tr>
        `).join('');
      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-danger" style="padding:32px">فشل تحميل البيانات</td></tr>';
      }
    }

    async function addConfig() {
      const baseUrl = document.getElementById('w-base-url').value.trim();
      const instance = document.getElementById('w-instance').value.trim();
      const apikey = document.getElementById('w-apikey').value.trim();
      const number = document.getElementById('w-number').value.trim();
      
      const triggerChecks = document.querySelectorAll('.w-trigger-check:checked');
      const triggers = Array.from(triggerChecks).map(cb => cb.value);

      if (!baseUrl || !instance || !apikey || !number) {
        return showToast('يرجى ملء جميع الحقول المطلوبة', 'error');
      }
      if (triggers.length === 0) {
        return showToast('يرجى اختيار حدث واحد على الأقل', 'error');
      }

      try {
        const rawConfigs = await api.getSetting(CONFIG_KEY, false);
        console.log('[WhatsApp] Loaded configs:', rawConfigs);
        let configs = Array.isArray(rawConfigs) ? rawConfigs : [];
        
        configs.push({ baseUrl, instance, apikey, number, triggers });
        console.log('[WhatsApp] Saving updated configs:', configs);
        
        await api.updateSetting(CONFIG_KEY, configs);
        
        showToast('تمت إضافة الإعدادات بنجاح');
        // Clear fields
        document.getElementById('w-base-url').value = '';
        document.getElementById('w-instance').value = '';
        document.getElementById('w-apikey').value = '';
        document.getElementById('w-number').value = '';
        triggerChecks.forEach(cb => cb.checked = false);
        
        await loadConfigs();
      } catch (e) {
        console.error('[WhatsApp] Add config failed:', e);
        showToast(e.message, 'error');
      }
    }

    async function deleteConfig(idx) {
      try {
        const rawConfigs = await api.getSetting(CONFIG_KEY, false);
        let configs = Array.isArray(rawConfigs) ? rawConfigs : [];
        
        configs.splice(idx, 1);
        await api.updateSetting(CONFIG_KEY, configs);
        showToast('تم الحذف بنجاح');
        await loadConfigs();
      } catch (e) {
        console.error('[WhatsApp] Delete config failed:', e);
        showToast(e.message, 'error');
      }
    }
  </script>
