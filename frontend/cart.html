<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <meta name="description" content="سلة التسوق — مراجعة المنتجات قبل إتمام الشراء">
  <title>سلة التسوق | </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/store.css">
</head>
<body class="has-bottom-nav">
  <header class="store-header">
    <div class="container">
      <a href="/" class="header-icon back-btn" onclick="if(history.length > 1) { history.back(); return false; }"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px; color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/></svg></a>
      <a href="/" class="store-logo-link"><img src="" alt="Logo" class="store-logo-img" style="opacity:0; transition: opacity 0.2s;"></a>
      
      <div class="header-icons">
        <button class="header-icon search-icon-btn" onclick="api.openSearch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <a href="#" onclick="Cart.openCart(); return false;" class="nav-item" id="header-cart-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="mobile-nav-badge" id="cart-count" style="display:none">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <h1 class="page-title">سلة التسوق</h1>
      <p class="page-subtitle" id="cart-subtitle">راجع منتجاتك قبل إتمام الشراء</p>

      <div id="cart-items" style="display:flex;flex-direction:column;gap:16px"></div>

      <div id="cart-empty" class="hidden" style="text-align:center;padding:60px 20px">
        <div style="font-size:3rem;margin-bottom:12px">🛒</div>
        <h3 style="margin-bottom:6px">سلة التسوق فارغة</h3>
        <p class="text-muted" style="margin-bottom:16px">ابدأ التسوق لإضافة منتجات</p>
        <a href="/" class="btn btn-primary">تصفح المنتجات</a>
      </div>

      <div id="cart-footer" class="mt-24" style="max-width:400px;margin-right:auto">
        <div style="display:flex;justify-content:space-between;font-size:1.15rem;font-weight:700;padding:16px 0;border-top:1px solid #eee">
          <span>المجموع</span>
          <span id="cart-total">0 ج.م</span>
        </div>
        <a href="checkout" class="btn btn-primary btn-block" id="checkout-btn" style="padding:14px;font-size:1rem;background:var(--primary,var(--primary));border-color:var(--primary,var(--primary))">إتمام الشراء ←</a>
      </div>
    </div>
  </main>

  <nav class="mobile-bottom-nav">
    <div class="nav-items">
      <a href="/" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>الرئيسية</span>
      </a>
      <a href="products" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>متجر</span>
      </a>
      <a href="#" class="nav-item" id="mobile-cart-link" onclick="Cart.openCart(); return false;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span>السلة</span>
        <span class="mobile-nav-badge" id="mobile-cart-count" class="mobile-nav-badge" style="display:none">0</span>
      </a>
      <a href="#" target="_blank" class="nav-item" id="nav-wa-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l1.65-3.8a9 9 0 1 1 3.4 2.9L3 21"/><path d="M9 10a.5.5 0 0 0 1 0V9a.5.5 0 0 0-1 0v1a5 5 0 0 0 5 5h1a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1"/></svg>
        <span>واتساب</span>
      </a>
      <a href="#" target="_blank" class="nav-item" id="nav-tg-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
        <span>تليجرام</span>
      </a>
    </div>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);

    function renderCart() {
      const items = Cart.getItems();
      const container = document.getElementById('cart-items');
      const emptyEl = document.getElementById('cart-empty');
      const footerEl = document.getElementById('cart-footer');

      if (!items.length) {
        container.innerHTML = '';
        emptyEl.classList.remove('hidden');
        footerEl.classList.add('hidden');
        return;
      }

      emptyEl.classList.add('hidden');
      footerEl.classList.remove('hidden');

      function getAvailable(item) {
        if (item.selectedOptions && item.selectedOptions.length > 0 && item.variants && item.variants.length > 0) {
          const v = item.variants.find(v => item.selectedOptions.every(so => v.combination[so.groupName] === so.label));
          return (v && v.quantity !== null && v.quantity !== undefined) ? v.quantity : Infinity;
        }
        return (item.availableQuantity !== null && item.availableQuantity !== undefined) ? item.availableQuantity : Infinity;
      }

      let hasInvalidStock = false;

      container.innerHTML = items.map(item => {
        const available = getAvailable(item);
        if (available !== Infinity && item.quantity > available) hasInvalidStock = true;
        const stockWarning = (available !== Infinity && item.quantity > available) 
          ? `<div style="font-size:0.75rem; color:#ef4444; margin-top:4px; font-weight:600; background:#fee2e2; padding:2px 8px; border-radius:4px; display:inline-block;">عذراً، يتوفر ${available} قطعة فقط</div>`
          : '';

        return `
        <div class="cart-item">
          <img class="cart-item-img" src="${item.imageUrl ? api.optimizeImageUrl(item.imageUrl, 150) : ''}" alt="${item.name}"
            onerror="this.style.background='#f5f5f5';this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiBmaWxsPSIjZjVmNWY1Ii8+PC9zdmc+'">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-options">${item.selectedOptions.map(o => `${o.groupName}: ${o.label}`).join(' · ')}</div>
            <div class="cart-item-price">${formatPrice(item.unitPrice)} للوحدة</div>
            ${stockWarning}
          </div>
          <div class="cart-item-actions">
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQty('${item.key}', ${item.quantity - 1})">−</button>
              <span class="qty-value">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty('${item.key}', ${item.quantity + 1})">+</button>
            </div>
            <strong>${formatPrice(item.unitPrice * item.quantity)}</strong>
            <button class="btn btn-danger btn-sm" onclick="removeItem('${item.key}')">✕</button>
          </div>
        </div>
      `}).join('');

      document.getElementById('cart-total').textContent = formatPrice(Cart.getTotal());

      const checkoutBtn = document.getElementById('checkout-btn');
      if (checkoutBtn) {
        if (hasInvalidStock) {
          checkoutBtn.style.pointerEvents = 'none';
          checkoutBtn.style.opacity = '0.5';
          checkoutBtn.title = 'يرجى تعديل الكميات غير المتوفرة';
        } else {
          checkoutBtn.style.pointerEvents = 'auto';
          checkoutBtn.style.opacity = '1';
          checkoutBtn.title = '';
        }
      }
    }

    function updateQty(key, qty) { Cart.updateQty(key, qty); renderCart(); }
    function removeItem(key) { Cart.removeItem(key); renderCart(); showToast('تم إزالة المنتج'); }
  </script>
</body>
</html>
