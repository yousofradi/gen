<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <title>Order Confirmed — eCommerce Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/store.css">
</head>

<body>
  <div class="page-wrapper">
    <header class="store-header">
      <div class="container">
        <a href="/" class="header-icon back-btn" onclick="if(history.length > 1) { history.back(); return false; }"><svg
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="width: 24px; height: 24px; color: var(--text-muted);">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6" />
          </svg></a>
        <a href="/" class="store-logo-link"><img src="" alt="Logo" class="store-logo-img"
            style="opacity:0; transition: opacity 0.2s;"></a>

        <div class="header-icons">
          <button class="header-icon search-icon-btn" onclick="api.openSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <a href="#" onclick="Cart.openCart(); return false;" class="nav-item" id="header-cart-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            <span class="mobile-nav-badge" id="cart-count" style="display:none">0</span>
          </a>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div class="container">
        <div class="success-container fade-in">
          <div id="order-details-container"
            style="display:none; text-align: right; width: 100%; max-width: 500px; margin: 0 auto 32px; background: #f8fafc; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">
            <h3
              style="margin: 0 0 16px; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; font-size: 1.2rem;">
              ملخص الطلب <span id="summary-order-id" style="color: #0f172a;"></span></h3>

            <div style="margin-bottom: 16px;">
              <h4 style="margin: 0 0 8px; color: #475569; font-size: 0.95rem;">بيانات العميل</h4>
              <div style="font-size: 0.9rem; color: #1e293b; line-height: 1.6;">
                <div><strong>الاسم:</strong> <span id="summ-name"></span></div>
                <div><strong>رقم الهاتف:</strong> <span id="summ-phone"></span></div>
                <div><strong>العنوان:</strong> <span id="summ-address"></span>, <span id="summ-gov"></span></div>
              </div>
            </div>

            <div style="margin-bottom: 16px;">
              <h4 style="margin: 0 0 8px; color: #475569; font-size: 0.95rem;">المنتجات</h4>
              <div id="summ-items" style="font-size: 0.9rem; color: #1e293b; line-height: 1.6;"></div>
            </div>

            <div
              style="border-top: 1px dashed #cbd5e1; padding-top: 12px; margin-top: 12px; font-size: 0.95rem; line-height: 1.6;">
              <div style="display: flex; justify-content: space-between;">
                <span>المجموع الفرعي:</span>
                <span id="summ-subtotal" style="font-weight: 600;"></span>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <span>مصاريف الشحن:</span>
                <span id="summ-shipping" style="font-weight: 600;"></span>
              </div>
              <div
                style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 1.1rem; color: var(--primary);">
                <span>الإجمالي:</span>
                <span id="summ-total" style="font-weight: 700;"></span>
              </div>
            </div>
          </div>

          <div
            style="display: flex; gap: 12px; justify-content: center; flex-wrap: nowrap; margin-bottom: 40px; padding: 0 10px;">
            <a href="#" id="whatsapp-btn" target="_blank" class="btn"
              style="flex: 2; background: #25D366; color: #fff; border: none; display: none; justify-content: center; align-items: center; gap: 8px; font-size: 1rem; border-radius: 8px; padding: 12px;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
              </svg>
              تواصل معنا على واتساب
            </a>
            <a href="/" class="btn btn-secondary"
              style="flex: 1; display: flex; justify-content: center; align-items: center; background: #fff; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; padding: 12px;">العودة
              للمتجر</a>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script>
    async function copyNumber() {
      const settings = await api.getSetting('sundura_global_settings');
      const num = settings ? settings.socialWa : '';
      navigator.clipboard.writeText(num).then(() => {
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s ease;';
        modal.innerHTML = `
          <div style="background:#fff;padding:24px 32px;border-radius:16px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.15);transform:scale(0.9);transition:transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);" onclick="event.stopPropagation()">
            <h3 style="margin:0;color:#111827;font-size:1.25rem;font-weight:700;">تم النسخ بنجاح</h3>
          </div>
        `;
        modal.onclick = function () {
          modal.style.opacity = '0';
          setTimeout(() => modal.remove(), 200);
        };
        document.body.appendChild(modal);
        // Trigger reflow
        void modal.offsetWidth;
        modal.style.opacity = '1';
        modal.querySelector('div').style.transform = 'scale(1)';

        setTimeout(() => {
          if (document.body.contains(modal)) {
            modal.style.opacity = '0';
            setTimeout(() => modal.remove(), 200);
          }
        }, 2000);
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('id');
      const summaryOrderIdEl = document.getElementById('summary-order-id');
      const whatsappBtn = document.getElementById('whatsapp-btn');

      if (!orderId) { window.location.href = 'index'; return; }

      try {
        const order = await api.getPublicOrder(orderId);
        if (!order) { window.location.href = 'index'; return; }

        const displayId = order.orderId.replace('Order-', '');
        if (summaryOrderIdEl) summaryOrderIdEl.textContent = displayId;

        document.getElementById('order-details-container').style.display = 'block';

        document.getElementById('summ-name').textContent = order.customer.name;
        document.getElementById('summ-phone').textContent = order.customer.phone;
        document.getElementById('summ-address').textContent = order.customer.address;
        document.getElementById('summ-gov').textContent = order.customer.government;

        document.getElementById('summ-items').innerHTML = order.items.map(item =>
          `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0;">
            <div style="width: 48px; height: 48px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
              ${item.imageUrl ? `<img src="${api.optimizeImageUrl(item.imageUrl, 150)}" style="max-width: 100%; max-height: 100%; object-fit: cover;">` : `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                </svg>
              `}
            </div>
            <div style="flex: 1; text-align: right; padding: 0 12px;">
              <div style="font-weight: 700; font-size: 0.9rem;">${item.name}</div>
              <div style="font-size: 0.85rem; color: #64748b; white-space: nowrap; font-weight: 500;">${item.quantity} x ${formatPrice(item.unitPrice)}</div>
              <div style="font-size: 0.8rem; color: #64748b;">${item.selectedOptions.map(o => `${o.groupName}: ${o.label}`).join(', ')}</div>
            </div>
            <span style="font-weight: 700; color: #1e293b;">${formatPrice(item.finalPrice)}</span>
          </div>`
        ).join('');

        const subtotal = order.items.reduce((s, i) => s + i.finalPrice, 0);
        document.getElementById('summ-subtotal').textContent = formatPrice(subtotal);
        document.getElementById('summ-shipping').textContent = formatPrice(order.shippingFee);
        document.getElementById('summ-total').textContent = formatPrice(order.totalPrice);

        const settings = await api.getSetting('sundura_global_settings');
        let waNumber = (settings.socialWa || '').replace(/[^0-9]/g, '');
        if (waNumber.startsWith('01')) waNumber = '2' + waNumber;
        const brandName = settings.storeNameAr || settings.invoicePrefix || 'المتجر';
        const waMessage = encodeURIComponent(`مرحباً، قمت بطلب من متجر ${brandName}.\nرقم الطلب الخاص بي هو: ${order.orderId}`);
        whatsappBtn.href = `https://wa.me/${waNumber}?text=${waMessage}`;
        whatsappBtn.style.display = 'flex';
      } catch (e) {
        console.error('Failed to load order', e);
        window.location.href = 'index';
      }
      Cart.clear();
    });
  </script>
</body>

</html>
