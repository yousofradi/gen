<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الشراء | </title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/store.css">
  <style>
    .radio-option {
      width: 100%;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      cursor: pointer;
      gap: 6px;
      background: #fff;
      padding: 8px 12px;
      border-radius: 50px;
      border: 1.5px solid #e5e7eb;
      transition: all 0.2s ease;
    }

    .radio-option input[type="radio"]:checked+label {
      background: var(--primary-light) !important;
      border-color: #d1d5db;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <header class="store-header">
      <div class="container">
        <a href="/" class="header-icon back-btn"
          onclick="if(window.Cart) Cart.closeCart(); if(history.length > 1) { history.back(); return false; }"><svg
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="width: 24px; height: 24px; color: var(--text-muted);">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6" />
          </svg></a>
        <a href="/" class="store-logo-link"><img src="" alt="Logo" class="store-logo-img"
            style="opacity:0; transition: opacity 0.2s;"></a>

        <div class="header-icons">
          <button class="header-icon search-icon-btn" onclick="api.openSearch()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
          <a href="#" onclick="Cart.openCart(); return false;" class="nav-item" id="header-cart-link">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            <span class="mobile-nav-badge" id="cart-count" style="display:none">0</span>
          </a>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div class="container">
        <div class="checkout-grid" style="margin-top: 24px;">
          <form id="checkout-form">
            <h2 class="mb-24">بيانات العميل</h2>
            <div style="display: flex; flex-direction: column; gap: 20px;">
              <div class="form-group">
                <label class="form-label" for="cust-name">الاسم بالكامل *</label>
                <input class="form-control" id="cust-name" required placeholder="الاسم تثائي او ثلاثي">
              </div>
              <div class="grid-2-always" style="gap:16px;">
                <div class="form-group" style="margin-bottom:0">
                  <label class="form-label" for="cust-phone">رقم الهاتف *</label>
                  <div class="phone-input-wrapper">
                    <div class="phone-input-flag">
                      <img src="https://flagcdn.com/w20/eg.png" alt="EG"> +20
                    </div>
                    <input id="cust-phone" type="tel" required placeholder="01XXXXXXXXX" minlength="11" maxlength="11"
                      pattern="01[0-9]{9}">
                  </div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                  <label class="form-label" for="cust-phone2">هاتف آخر</label>
                  <div class="phone-input-wrapper">
                    <div class="phone-input-flag">
                      <img src="https://flagcdn.com/w20/eg.png" alt="EG"> +20
                    </div>
                    <input id="cust-phone2" type="tel" placeholder="اختياري">
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="government">المحافظة (المدينة) *</label>
                <select class="form-control" id="government" required>
                  <option value="">اختر المدينة...</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="zone">المنطقة *</label>
                <select class="form-control" id="zone" required>
                  <option value="">اختر المنطقة...</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="cust-address">العنوان *</label>
              <textarea class="form-control" id="cust-address" required
                placeholder="مثال: رقم الشقة، اسم العمارة، اسم الشارع، علامة مميزة"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="cust-notes">ملاحظات</label>
              <textarea class="form-control" id="cust-notes"
                placeholder="ملاحظاتك للبائع (الالوان - الاشكال)"></textarea>
            </div>
            <h2 class="mb-24 mt-32">طريقة الدفع</h2>
            <div id="payment-methods-checkout" class="radio-options mb-24" style="display: grid; gap: 8px;">
              <!-- Dynamic payment methods injected here -->
            </div>
            <div id="payment-instructions"
              style="display:none; padding:16px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; margin-bottom:24px; font-size:0.85rem; color:var(--text-main); line-height:1.6; white-space: pre-wrap;">
            </div>
            <button type="submit" class="btn btn-primary btn-block"
              style="padding:10px 20px;font-size:1rem;background:var(--primary,var(--primary));border-color:var(--primary,var(--primary)); margin-bottom: 20px;">تأكيد
              الطلب</button>
          </form>
          <div>
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
              <h2 style="margin: 0;">ملخص الطلب</h2>
              <img src="" alt="Logo" class="store-logo-img"
                style="height: 32px; object-fit: contain; opacity:0; transition: opacity 0.2s;">
            </div>
            <div id="order-items" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>
            <div class="price-summary">
              <div class="price-row"><span>المجموع الفرعي</span><span id="subtotal">0 ج.م</span></div>
              <div class="price-row"><span>الشحن</span><span id="shipping-fee">—</span></div>
              <div class="price-row total"><span>الإجمالي</span><span class="price-value" id="total-price">0 ج.م</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>

</html>
